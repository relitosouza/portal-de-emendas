<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Escudo -->
  <path d="M50 2 
           C20 2 10 25 10 35 
           C10 65 50 98 50 98 
           C50 98 90 65 90 35 
           C90 25 80 2 50 2 Z" 
        fill="white" stroke="#ccc" stroke-width="1" filter="url(#shadow)"/>

  <!-- Faixa Verde -->
  <path d="M20 35 L80 35 L50 85 Z" fill="#009e49" opacity="0.9"/>
  
  <!-- Faixa Vermelha Centrada -->
  <circle cx="50" cy="35" r="15" fill="#ce1126" />
  
  <!-- Detalhe Dourado -->
  <path d="M50 25 L45 35 L55 35 Z" fill="#fcc02c" />
  
  <!-- Tocha/Chama estilizada -->
  <path d="M46 20 Q50 10 54 20 Q50 30 46 20" fill="#eab308" />

  <text x="50" y="38" font-family="Arial" font-size="8" fill="white" text-anchor="middle" font-weight="bold" style="text-shadow: 1px 1px 1px rgba(0,0,0,0.5);">OSASCO</text>
  
  <!-- Faixa inferior estilizada -->
  <path d="M30 65 Q50 75 70 65" fill="none" stroke="white" stroke-width="2" opacity="0.8" />
</svg>
